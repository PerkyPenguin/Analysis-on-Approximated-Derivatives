modelFile: "/LWR3-MuJoCo-Model/scene_2.xml"
modelName: "/LWR3-reaching"
timeStep: 0.008
openloop_horizon: 500
mpc_horizon: 50
keypointMethod: "set_interval"   # Possible values: "set_interval", "contact_change", "contact_change_dyn"
minN: 1
maxN: 50

robots:
  LWR:
    jointNames: ["LWR_joint1", "LWR_joint2", "LWR_joint3", "LWR_joint4", "LWR_joint5", "LWR_joint6", "LWR_joint7"]
    actuatorNames: ["LWR_joint1", "LWR_joint2", "LWR_joint3", "LWR_joint4", "LWR_joint5", "LWR_joint6", "LWR_joint7"]
    torqueControl: true 
    torqueLimits: [87, 87, 87, 87, 12, 12, 12]
    startPos: [-1, 0.5, 0, -1, 0, 0.6, 1]
    position_threshold: 0.1 # Value between 0 and 1 - uses joint limits
    velocity_threshold: 0.1 # Raw velocity threshold value
    control_threshold: 0.1 # Value between 0 and 1 - uses control limits

residuals:
  EE_goal:
    target: [1, 0.5, 2, -1.4, 0, 0.6, 1]
    weight: 0.1
    weight_terminal: 1000
    resid_dimension: 7
  joint_velocities:
    target: [0, 0, 0, 0, 0, 0, 0]
    weight: 0.01
    weight_terminal: 100
    resid_dimension: 7