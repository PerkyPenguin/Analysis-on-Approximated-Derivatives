# Open loop resisuals
residuals:
  body_height:
    target: [0]
    weight: 0.1
    weight_terminal: 10
  body_orientation:
    target: [0]
    weight: 0.1
    weight_terminal: 10
  body_velocity:
    target: [0.5]
    weight: 0.1
    weight_terminal: 0.1
  body_controls:
    target: [0]
    resid_dimension: 6
    weight: 0.001
    weight_terminal: 0