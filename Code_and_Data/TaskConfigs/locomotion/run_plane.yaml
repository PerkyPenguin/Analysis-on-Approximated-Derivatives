modelFile: "/mujoco_models/walker/walker_plane.xml"
modelName: "/walker_run"
timeStep: 0.005
keypointMethod: "contact_change_dyn"   # Possible values: "set_interval", "contact_change", "contact_change_sep", "contact_change_dyn"
auto_adjust: false
minN: 1
maxN: 20
mpc_horizon: 100
openloop_horizon: 200 # Was 100

robots:
  walker:
    jointNames: ["rootz", "rootx", "rooty", "right_hip", "right_knee", "right_ankle", "left_hip", "left_knee", "left_ankle"]
    actuatorNames: ["right_hip", "right_knee", "right_ankle", "left_hip", "left_knee", "left_ankle"]
    torqueControl: true
    torqueLimits: [1, 1, 1, 1, 1, 1]
    startPos: [0, 0, 0, 1, -1, 0.2, 0, 0, 0]
    position_threshold: 0.4  # Value between 0 and 1 - uses joint limits
    velocity_threshold: 20    # Raw velocity threshold value
    control_threshold: 0.8   # Value between 0 and 1 - uses control limits

