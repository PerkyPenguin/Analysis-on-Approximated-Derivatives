# Open loop residuals
residuals:
  goal_pos:
    target: [0.65, 0.4]
    weight: 0
    weight_terminal: 1000
  goal_vel:
    target: [0, 0]
    weight: 0.1
    weight_terminal: 100
  reach:
    target: [0]
    weight: 0
    weight_terminal: 0