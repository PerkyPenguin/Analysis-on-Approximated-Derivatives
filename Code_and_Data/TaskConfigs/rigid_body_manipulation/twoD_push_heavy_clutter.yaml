modelFile: "/mujoco_models/Franka_emika_scenes_V1/cylinder_pushing_heavyClutter.xml"
modelName: "/push_mcl"
timeStep: 0.005
openloop_horizon: 1000
mpc_horizon: 50
keypointMethod: "contact_change"   # Possible values: "set_interval", "contact_change", "contact_change_sep", "contact_change_dyn"
auto_adjust: false
minN: 1
maxN: 50

robots:
  panda:
    jointNames: ["panda0_joint1", "panda0_joint2", "panda0_joint3", "panda0_joint4", "panda0_joint5", "panda0_joint6", "panda0_joint7"]
    actuatorNames: ["panda0_joint1", "panda0_joint2", "panda0_joint3", "panda0_joint4", "panda0_joint5", "panda0_joint6", "panda0_joint7"]
    torqueControl: true
    torqueLimits: [87, 87, 87, 87, 12, 12, 12]
    startPos: [0, -0.183, 0, -3.1, 0, 1.34, 0]
    position_threshold: 0.01  # Value between 0 and 1 - uses joint limits
    velocity_threshold: 0.1    # Raw velocity threshold value
    control_threshold: 0.05   # Value between 0 and 1 - uses control limits

bodies:
  goal:
    activeLinearDOF: [true, true, true]
    activeAngularDOF: [true, true, true]
    startLinearPos: [0.4, 0.2, 0.0]
    startAngularPos: [0, 0, 0]
  obstacle_1:
    activeLinearDOF: [true, true, true]
    activeAngularDOF: [true, true, true]
    startLinearPos: [0.65, 0.45, 0.0]
    startAngularPos: [0, 0, 0]
  obstacle_2:
    activeLinearDOF: [ true, true, true ]
    activeAngularDOF: [true, true, true]
    startLinearPos: [ 0.68, 0.3, 0.0 ]
    startAngularPos: [ 0, 0, 0 ]
  obstacle_3:
    activeLinearDOF: [ true, true, true ]
    activeAngularDOF: [true, true, true]
    startLinearPos: [ 0.72, 0.3, 0.0 ]
    startAngularPos: [ 0, 0, 0 ]
  obstacle_4:
    activeLinearDOF: [ true, true, true ]
    activeAngularDOF: [true, true, true]
    startLinearPos: [ 0.5, 0.2, 0.0 ]
    startAngularPos: [ 0, 0, 0 ]
  obstacle_5:
    activeLinearDOF: [ true, true, true ]
    activeAngularDOF: [true, true, true]
    startLinearPos: [ 0.55, 0.45, 0.0 ]
    startAngularPos: [ 0, 0, 0 ]
  obstacle_6:
    activeLinearDOF: [ true, true, true ]
    activeAngularDOF: [true, true, true]
    startLinearPos: [ 0.6, 0.15, 0.0 ]
    startAngularPos: [ 0, 0, 0 ]
  obstacle_7:
    activeLinearDOF: [ true, true, true ]
    activeAngularDOF: [true, true, true]
    startLinearPos: [ 0.75, 0.5, 0.0 ]
    startAngularPos: [ 0, 0, 0 ]

# MPC residuals
residuals:
  goal_pos:
    target: [0.7, 0.0]
    weight: 0.5
    weight_terminal: 1
  goal_vel:
    target: [0, 0]
    weight: 0.05
    weight_terminal: 0
  obstacle_1_pos:
    target: [ 0.65, 0.45 ]
    weight: 0
    weight_terminal: 0
  obstacle_2_pos:
    target: [ 0.68, 0.3 ]
    weight: 0
    weight_terminal: 0
  obstacle_3_pos:
    target: [ 0.72, 0.3 ]
    weight: 0
    weight_terminal: 0
  obstacle_4_pos:
    target: [ 0.5, 0.2 ]
    weight: 0
    weight_terminal: 0
  obstacle_5_pos:
    target: [ 0.55, 0.45 ]
    weight: 0
    weight_terminal: 0
  obstacle_6_pos:
    target: [ 0.6, 0.15 ]
    weight: 0
    weight_terminal: 0
  obstacle_7_pos:
    target: [ 0.75, 0.5 ]
    weight: 0
    weight_terminal: 0
  joint_5_velocity:
    target: [ 0 ]
    weight: 0.1
    weight_terminal: 0
  reach:
    target: [0]
    weight: 0
    weight_terminal: 0

