modelFile: "/mujoco_models/Franka_emika_scenes_V1/cylinder_pushing_lowClutter.xml"
modelName: "/push_lcl"
timeStep: 0.008
openloop_horizon: 1000
mpc_horizon: 100
keypointMethod: "set_interval"   # Possible values: "set_interval", "contact_change", "contact_change_sep", "contact_change_dyn", "contact_change_maxN"
minN: 1
maxN: 20

robots:
  panda:
    jointNames: ["panda0_joint1", "panda0_joint2", "panda0_joint3", "panda0_joint4", "panda0_joint5", "panda0_joint6", "panda0_joint7"]
    actuatorNames: ["panda0_joint1", "panda0_joint2", "panda0_joint3", "panda0_joint4", "panda0_joint5", "panda0_joint6", "panda0_joint7"]
    torqueControl: true
    torqueLimits: [87, 87, 87, 87, 12, 12, 12]
    startPos: [0, -0.183, 0, -3.1, 0, 1.34, 0]
    position_threshold: 0.1  # Value between 0 and 1 - uses joint limits
    velocity_threshold: 0.1    # Raw velocity threshold value
    control_threshold: 0.1   # Value between 0 and 1 - uses control limits
bodies:
  goal:
    activeLinearDOF: [true, true, true]
    activeAngularDOF: [true, true, true]
    startLinearPos: [0.45, 0, 0.0]
    startAngularPos: [0, 0, 0]
  obstacle_1:
    activeLinearDOF: [true, true, true]
    activeAngularDOF: [true, true, true]
    startLinearPos: [0.6, 0, 0.0]
    startAngularPos: [0, 0, 0]
  obstacle_2:
    activeLinearDOF: [ true, true, true ]
    activeAngularDOF: [ true, true, true ]
    startLinearPos: [ 0.6, 0.1, 0.0 ]
    startAngularPos: [ 0, 0, 0 ]
  obstacle_3:
    activeLinearDOF: [ true, true, true ]
    activeAngularDOF: [ true, true, true ]
    startLinearPos: [ 0.7, 0, 0.0 ]
    startAngularPos: [ 0, 0, 0 ]

residuals:
  goal_pos:
    target: [0.7, 0.0]
    weight: 0.01
    weight_terminal: 1000  # 1000 when long horizon
  goal_vel:
    target: [0, 0]
    weight: 0.01
    weight_terminal: 5
  obstacle_1_pos:
    target: [ 0.6, 0 ]
    weight: 0
#    weight_terminal: 10
    weight_terminal: 0
  obstacle_2_pos:
    target: [ 0.6, 0.1 ]
    weight: 0
#    weight_terminal: 10
    weight_terminal: 0
  obstacle_3_pos:
    target: [ 0.7, 0 ]
    weight: 0
#    weight_terminal: 10
    weight_terminal: 0
  joint_5_velocity:
    target: [ 0 ]
    weight: 0.1
    weight_terminal: 0.1
  reach:
    target: [0]
#    weight: 0.001
#    weight_terminal: 0.001
    weight: 0
    weight_terminal: 0