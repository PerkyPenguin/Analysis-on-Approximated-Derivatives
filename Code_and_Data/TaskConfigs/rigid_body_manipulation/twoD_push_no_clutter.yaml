# Openloop residuals
residuals:
  goal_pos:
    target: [0.7, -0.1]
    weight: 0.1
    weight_terminal: 1000  # 1000 when long horizon
  goal_vel:
    target: [0, 0]
    weight: 0.1
    weight_terminal: 10
  joint_5_velocity:
    target: [ 0 ]
    weight: 0.1
    weight_terminal: 0.1
  reach:
    target: [0]
    weight: 0.001
    weight_terminal: 0.001