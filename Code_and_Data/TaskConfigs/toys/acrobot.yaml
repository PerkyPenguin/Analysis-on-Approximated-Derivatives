modelFile: "/mujoco_models/Acrobot/acrobot.xml"   # Path to the model xml file
modelName: "/acrobot"                             # Name of the model, used for saving data
timeStep: 0.01                                    # Time step for simulation
openloop_horizon: 500
keypointMethod: "set_interval"              # Possible values: "set_interval", "contact_change", "contact_change_sep", "contact_change_dyn"
minN: 1                                           # Minimum interval between key-points
maxN: 13                                          # Maximum interval between key-points

# stable down pos [3.1415, 0], half up unstable pos [3.14, 3.14], full up unstable pos [0, 0]
robots:
  acrobot:
    jointNames: [shoulder, elbow]
    actuatorNames: [elbow]
    torqueControl: true
    torqueLimits: [100]
    startPos: [2.0, 0.3]
#    position_threshold: 0.1  # Value between 0 and 1 - uses joint limits
#    velocity_threshold: 1    # Raw velocity threshold value
#    control_threshold: 0.1   # Value between 0 and 1 - uses control
    position_threshold: 0.05  # Value between 0 and 1 - uses joint limits
    velocity_threshold: 1    # Raw velocity threshold value
    control_threshold: 0.5   # Value between 0 and 1 - uses control limits


residuals:
  tip_x:
    target: [0]
    weight: 0
    weight_terminal: 1
  tip_z:
    target: [4.2]
    weight: 0
    weight_terminal: 100
  joint_0_vel:
    target: [0]
    weight: 0.0001
    weight_terminal: 0.1
  joint_1_vel:
    target: [0]
    weight: 0.0001
    weight_terminal: 0.1
  joint_0_torque:
    target: [0]
    weight: 0.1
    weight_terminal: 0.1