modelFile: "/mujoco_models/Piston_block/piston.xml"
modelName: "/piston_block"
timeStep: 0.005
openloop_horizon: 500
mpc_horizon: 100
keypointMethod: "set_interval"   # Possible values: "set_interval", "contact_change", "contact_change_sep", "contact_change_dyn"
auto_adjust: false
minN: 1
maxN: 500

robots:
  piston:
    jointNames: ["rod"]
    actuatorNames: ["piston_motor"]
    torqueControl: true
    torqueLimits: [1]
    startPos: [-0.5]

residuals:
  rod_x_pos:
    target: [0.5]
    weight: 0
    weight_terminal: 100
  rod_x_vel:
    target: [0]
    weight: 0.001
    weight_terminal: 10