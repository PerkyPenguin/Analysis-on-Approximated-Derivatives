modelFile: "/src/tests/test_xml/Franka_emika_scenes_V1/bimanual_pickup.xml"
modelName: "/bimanual_pickup"

timeStep: 0.005
openloop_horizon: 1500
mpc_horizon: 100
keypointMethod: "set_interval"   # Possible values: "set_interval", "contact_change", "contact_change_sep", "contact_change_dyn"
minN: 5
maxN: 100

robots:
  panda1:
    jointNames: ["panda0_joint1", "panda0_joint2", "panda0_joint3", "panda0_joint4", "panda0_joint5", "panda0_joint6", "panda0_joint7"]
    actuatorNames: ["panda0_joint1", "panda0_joint2", "panda0_joint3", "panda0_joint4", "panda0_joint5", "panda0_joint6", "panda0_joint7"]
    torqueControl: true
    torqueLimits: [87, 87, 87, 87, 12, 12, 12]
    startPos: [0.2, 0.53, 0, -1.5, 0, 0, 1.55]
    position_threshold: 0.1  # Value between 0 and 1 - uses joint limits
    velocity_threshold: 0.1    # Raw velocity threshold value
    control_threshold: 0.1   # Value between 0 and 1 - uses control limits
  panda2:
    jointNames: [ "panda1_joint1", "panda1_joint2", "panda1_joint3", "panda1_joint4", "panda1_joint5", "panda1_joint6", "panda1_joint7" ]
    actuatorNames: [ "panda1_joint1", "panda1_joint2", "panda1_joint3", "panda1_joint4", "panda1_joint5", "panda1_joint6", "panda1_joint7" ]
    torqueControl: true
    torqueLimits: [ 87, 87, 87, 87, 12, 12, 12 ]
    startPos: [ -0.2, 0.53, 0, -1.5, 0, 0, -1.55 ]
    position_threshold: 0.1  # Value between 0 and 1 - uses joint limits
    velocity_threshold: 0.1    # Raw velocity threshold value
    control_threshold: 0.1   # Value between 0 and 1 - uses control limits
bodies:
  goal:
    activeLinearDOF: [true, true, true]
    activeAngularDOF: [true, true, true]
    startLinearPos: [ 0.65, 0, 0.0 ]
    startAngularPos: [ 0, 0, 0 ]

#MPC residuals
residuals:
  goal_pos:
    target: [ 0.3, 0, 0.4 ]
    weight: 0
    weight_terminal: 0
  reach_1:
    target: [0]
    weight: 1
    weight_terminal: 0
  reach_2:
    target: [ 0 ]
    weight: 0
    weight_terminal: 0